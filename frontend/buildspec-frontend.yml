version: 0.2

phases:

  pre_build:
    commands:

      - echo Logging in to Amazon ECR...

      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 245246852393.dkr.ecr.ap-south-1.amazonaws.com

      - FRONTEND_REPO=cloudcart-frontend

      - AWS_ACCOUNT_ID=245246852393
      - AWS_DEFAULT_REGION=ap-south-1

      - IMAGE_TAG=latest

  build:
    commands:

      - echo Building frontend Docker image...

      - cd frontend

      - docker build -t $FRONTEND_REPO:$IMAGE_TAG .

      - docker tag $FRONTEND_REPO:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$FRONTEND_REPO:$IMAGE_TAG

      - cd ..

  post_build:
    commands:

      - echo Pushing frontend image to ECR...

      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$FRONTEND_REPO:$IMAGE_TAG

      - echo Frontend build completed successfully
